<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBnB Clone</title>
    <link rel="icon" type="images/x-icon" href="images/icon.png">
    <link rel="stylesheet" type="text/css" href="styles/4-common.css">
    <link rel="stylesheet" type="text/css" href="styles/3-header.css">
    <link rel="stylesheet" type="text/css" href="styles/3-footer.css">
    <link rel="stylesheet" type="text/css" href="styles/7-places.css">
    <link rel="stylesheet" type="text/css" href="styles/6-filters.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="AirBnB Logo">
        </div>
    </header>
    <div class="container">
        <section class="filters">
            <div class="locations">
                <h3>States</h3>
                <h4>Also available in</h4>
                <ul class="popover">
                    <h2>Congo</h2>
                    <li>Kinshasha</li>
                    <li>Bolingo</li>
                    <h2>United Kingdom</h2>
                    <li>London</li>
                    <li>Manchester</li>
                  </ul>
            </div>
            <div class="amenities">
                <h3>Amenities</h3>
                <h4>Availale Services</h4>
                <ul class="popover">
                    <li>Fast Wifi</li>
                    <li>CCTV</li>
                    <li>Swimming Pool</li>
                </ul>
            </div>
        
            <button type="button">
                Search
            </button>
        </section>
    </div>
        
    <section class="places">
        <h1>Places</h1>
        <article>
            <h2>My Home</h2>
        </article>
        <article>
            <h2>Tiny House</h2>
        </article>
        <article>
            <h2>A Suite</h2>
        </article>
    </section>
    </div>
    <footer>
        Best School
    </footer>
    
</body>
</html>
