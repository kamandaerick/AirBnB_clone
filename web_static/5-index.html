<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBnB Clone</title>
    <link rel="icon" type="images/x-icon" href="images/icon.png">
    <link rel="stylesheet" type="text/css" href="styles/4-common.css">
    <link rel="stylesheet" type="text/css" href="styles/3-header.css">
    <link rel="stylesheet" type="text/css" href="styles/3-footer.css">
    <link rel="stylesheet" type="text/css" href="styles/5-filters.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="AirBnB Logo">
        </div>
    </header>
    <div class="container">
        <section class="filters">
            <div class="locations">
                <h3>States</h3>
                <h4>Kenya, Tanzania, Uganda</h4>
            </div>
            <div class="amenities">
                <h3>Amenities</h3>
                <h4>Free Wifi, Water, CCTV</h4>
            </div>
        
            <button type="button">
                Search
            </button>
            </div>

        </section>
    </div>
    <footer>
        Best School
    </footer>
    
</body>
</html>
